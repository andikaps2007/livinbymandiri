<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livin Simulation Fullscreen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .scene.active {
            display: block;
            opacity: 1;
        }

        /* Identitas Gambar */
        #scene-splash1 { background-image: url('1000093572.jpg'); cursor: pointer; }
        #scene-splash2 { background-image: url('1000093573.jpg'); }
        #scene-login { background-image: url('1000093574.jpg'); }
        #scene-dashboard { background-image: url('1000093660.jpg'); }

        /* Tombol Transparan Login */
        #login-btn {
            position: absolute;
            bottom: 10%;
            left: 5%;
            width: 90%;
            height: 50px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* Pesan instruksi awal */
        #instruction {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            padding: 10px 0;
        }
    </style>
</head>
<body onclick="enableFullScreen()">

    <div id="instruction">Klik di mana saja untuk mulai & Full Screen</div>

    <div class="app-container">
        <div id="scene-splash1" class="scene active"></div>

        <div id="scene-splash2" class="scene"></div>

        <div id="scene-login" class="scene">
            <button id="login-btn" onclick="masukDashboard(event)"></button>
        </div>

        <div id="scene-dashboard" class="scene" onclick="tampilkanPerbaikan()"></div>
    </div>

    <script>
        const s1 = document.getElementById('scene-splash1');
        const s2 = document.getElementById('scene-splash2');
        const login = document.getElementById('scene-login');
        const dash = document.getElementById('scene-dashboard');
        const instruction = document.getElementById('instruction');

        let isStarted = false;

        // FUNGSI FULLSCREEN
        function enableFullScreen() {
            if (!isStarted) {
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) { /* Safari */
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) { /* IE11 */
                    elem.msRequestFullscreen();
                }
                
                instruction.style.display = 'none';
                startApp();
                isStarted = true;
            }
        }

        function gantiScene(lama, baru) {
            lama.classList.remove('active');
            setTimeout(() => {
                baru.classList.add('active');
            }, 50);
        }

        // Jalankan transisi splash screen
        function startApp() {
            // Gambar 1 tampil selama 5 detik
            setTimeout(() => {
                gantiScene(s1, s2);
                
                // Gambar 2 tampil selama 5 detik
                setTimeout(() => {
                    gantiScene(s2, login);
                }, 5000);

            }, 5000);
        }

        function masukDashboard(e) {
            e.stopPropagation(); // Mencegah trigger klik di background
            gantiScene(login, dash);
        }

        function tampilkanPerbaikan() {
            alert("Maaf, sistem sedang dalam perbaikan. Coba lagi nanti.");
        }
    </script>
</body>
</html>
    <div id="splash1" class="screen active" style="background-image: url('1.jpeg');"></div>

    <div id="splash2" class="screen" style="background-image: url('2.jpeg');"></div>

    <div id="login-screen" class="screen" style="background-image: url('3.jpeg');">
        <button id="login-btn" onclick="goToDashboard()"></button>
    </div>

    <div id="dashboard" class="screen" style="background-image: url('4.jpeg');"></div>

    <script>
        // Alur otomatis untuk Splash Screen
        setTimeout(() => {
            // Pindah dari Splash 1 ke Splash 2
            document.getElementById('splash1').classList.remove('active');
            document.getElementById('splash2').classList.add('active');

            setTimeout(() => {
                // Pindah dari Splash 2 ke Login Screen
                document.getElementById('splash2').classList.remove('active');
                document.getElementById('login-screen').classList.add('active');
            }, 1000); // Durasi gambar kedua 1 detik

        }, 1000); // Durasi gambar pertama 1 detik

        // Fungsi klik tombol login
        function goToDashboard() {
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('dashboard').classList.add('active');
        }
    </script>
</body>
</html>
