<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Livin Simulation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #004ead;
            font-family: sans-serif;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Gaya untuk setiap layar utama */
        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }

        .scene img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Agar gambar memenuhi layar */
        }

        .scene.active {
            display: block;
            opacity: 1;
        }

        /* Area tombol login transparan */
        #login-btn {
            position: absolute;
            bottom: 8%; /* Posisi disesuaikan dengan gambar login.jpeg */
            left: 5%;
            width: 90%;
            height: 60px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        /* Gaya Popup Muncul ke Atas */
        #popup-notif {
            position: fixed;
            bottom: -100%; /* Sembunyi di bawah layar */
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 100;
            transition: bottom 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #popup-notif img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Agar seluruh gambar notif terlihat jelas */
        }

        #popup-notif.show {
            bottom: 0; /* Meluncur naik ke posisi normal */
        }

        /* Tombol untuk menutup popup (X) */
        #close-notif {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 110;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="s1" class="scene active">
            <img src="splash1.jpeg">
        </div>

        <div id="s2" class="scene">
            <img src="splash2.jpeg">
        </div>

        <div id="s3" class="scene">
            <img src="login.jpeg">
            <button id="login-btn" onclick="keDashboard()"></button>
        </div>

        <div id="s4" class="scene" onclick="munculNotif()">
            <img src="dashboard.jpeg">
        </div>
    </div>

    <div id="popup-notif">
        <button id="close-notif" onclick="tutupNotif()"></button>
        <img src="fitur-tidak-tersedia.jpeg">
    </div>

    <script>
        const sc1 = document.getElementById('s1');
        const sc2 = document.getElementById('s2');
        const sc3 = document.getElementById('s3');
        const sc4 = document.getElementById('s4');
        const pop = document.getElementById('popup-notif');

        // OTOMATIS JALAN SAAT HALAMAN DIBUKA
        window.onload = function() {
            // Tampilkan splash1 selama 5 detik
            setTimeout(() => {
                transisi(sc1, sc2);
                
                // Tampilkan splash2 selama 5 detik
                setTimeout(() => {
                    transisi(sc2, sc3);
                }, 5000);

            }, 5000);
        };

        function transisi(lama, baru) {
            lama.classList.remove('active');
            setTimeout(() => {
                baru.classList.add('active');
            }, 50);
        }

        function keDashboard() {
            transisi(sc3, sc4);
        }

        function munculNotif() {
            pop.classList.add('show');
        }

        function tutupNotif() {
            pop.classList.remove('show');
        }
    </script>
</body>
</html>
