<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Livin Simulation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #004ead;
            font-family: sans-serif;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .scene img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scene.active {
            display: block;
            opacity: 1;
        }

        /* Popup Fitur Tidak Tersedia */
        #popup-notif {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 100;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        #popup-notif img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #popup-notif.show {
            bottom: 0;
        }

        /* Tombol Invisible */
        #login-btn {
            position: absolute;
            bottom: 8%;
            left: 5%;
            width: 90%;
            height: 65px;
            background: transparent;
            border: none;
            z-index: 10;
        }

        /* Instruksi melayang di awal */
        #hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 30px;
            z-index: 50;
            pointer-events: none;
            font-weight: bold;
        }
    </style>
</head>
<body onclick="startApp()">

    <div id="hint">Ketuk untuk mulai Full Screen</div>

    <div class="app-container">
        <div id="s1" class="scene active">
            <img src="1000093572.jpeg">
        </div>

        <div id="s2" class="scene">
            <img src="1000093573.jpeg">
        </div>

        <div id="s3" class="scene">
            <img src="1000093574.jpeg">
            <button id="login-btn" onclick="goDash(event)"></button>
        </div>

        <div id="s4" class="scene" onclick="showPopup()">
            <img src="1000093660.jpeg">
        </div>
    </div>

    <div id="popup-notif" onclick="this.classList.remove('show')">
        <img src="1000093667.jpeg">
    </div>

    <script>
        const scene1 = document.getElementById('s1');
        const scene2 = document.getElementById('s2');
        const scene3 = document.getElementById('s3');
        const scene4 = document.getElementById('s4');
        const hint = document.getElementById('hint');
        const popup = document.getElementById('popup-notif');

        let hasStarted = false;

        function startApp() {
            if (hasStarted) return;
            
            // AKTIFKAN FULLSCREEN
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

            hint.style.display = 'none';
            hasStarted = true;

            // MULAI TIMER
            setTimeout(() => {
                transition(scene1, scene2);
                setTimeout(() => {
                    transition(scene2, scene3);
                }, 5000);
            }, 5000);
        }

        function transition(oldS, newS) {
            oldS.classList.remove('active');
            setTimeout(() => { newS.classList.add('active'); }, 50);
        }

        function goDash(e) {
            e.stopPropagation();
            transition(scene3, scene4);
        }

        function showPopup() {
            popup.classList.add('show');
        }
    </script>
</body>
</html>
