<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulasi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #004ead;
            font-family: sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: pointer; /* Memberi indikasi seluruh layar bisa diklik */
        }

        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .scene img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scene.active {
            display: block;
            opacity: 1;
        }

        /* Popup Full Layar Muncul ke Atas */
        #popup-container {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            z-index: 100;
            transition: bottom 0.5s ease-out;
            cursor: pointer;
        }

        #popup-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Dibuat full layar sesuai permintaan */
        }

        #popup-container.show {
            bottom: 0;
        }
    </style>
</head>
<body onclick="handleGlobalClick()">

    <div class="app-container">
        
        <div id="scene1" class="scene active">
            <img src="splash1.jpeg">
        </div>

        <div id="scene2" class="scene">
            <img src="splash2.jpeg">
        </div>

        <div id="scene3" class="scene">
            <img src="login.jpeg">
        </div>

        <div id="scene4" class="scene">
            <img src="dashboard.jpeg">
        </div>

    </div>

    <div id="popup-container" onclick="tutupPopup(event)">
        <img src="fitur-tidak-tersedia.jpeg">
    </div>

    <script>
        const s1 = document.getElementById('scene1');
        const s2 = document.getElementById('scene2');
        const s3 = document.getElementById('scene3');
        const s4 = document.getElementById('scene4');
        const popup = document.getElementById('popup-container');

        let appStarted = false;
        let currentScene = 1;

        function handleGlobalClick() {
            // 1. Klik pertama kali untuk memulai splash sequence
            if (!appStarted) {
                appStarted = true;
                jalankanSplash();
                return;
            }

            // 2. Jika sedang di halaman Login (Scene 3), klik di mana saja masuk Dashboard
            if (currentScene === 3) {
                masukDashboard();
            } 
            // 3. Jika sedang di Dashboard (Scene 4), klik di mana saja muncul popup
            else if (currentScene === 4 && !popup.classList.contains('show')) {
                pemicuPopup();
            }
        }

        function jalankanSplash() {
            // Splash 1 sudah tampil (Scene 1)
            setTimeout(() => {
                swapScene(s1, s2);
                currentScene = 2;
                
                setTimeout(() => {
                    swapScene(s2, s3);
                    currentScene = 3;
                }, 5000);

            }, 5000);
        }

        function swapScene(outScene, inScene) {
            outScene.classList.remove('active');
            setTimeout(() => {
                inScene.classList.add('active');
            }, 50);
        }

        function masukDashboard() {
            swapScene(s3, s4);
            currentScene = 4;
        }

        function pemicuPopup() {
            popup.classList.add('show');
        }

        function tutupPopup(e) {
            e.stopPropagation();
            popup.classList.remove('show');
        }
    </script>
</body>
</html>
