<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livin' by Mandiri Simulation</title>
    <style>
        /* Dasar tampilan mobile-first */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #2b91ff; /* Warna biru Mandiri */
            font-family: 'Segoe UI', sans-serif;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Scene untuk setiap gambar */
        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }

        /* Menampilkan gambar agar pas di layar tanpa terpotong */
        .scene img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Gambar akan menyesuaikan tanpa stretch */
        }

        .scene.active {
            display: block;
            opacity: 1;
        }

        /* Overlay Instruksi Awal */
        #start-overlay {
            position: absolute;
            z-index: 100;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        /* Area klik tombol login (posisi disesuaikan secara estimasi) */
        #login-trigger {
            position: absolute;
            bottom: 5%;
            width: 90%;
            height: 12%;
            left: 5%;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        .hint {
            font-size: 14px;
            margin-top: 10px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="launchApp()">
        <h1>Klik untuk Masuk</h1>
        <p class="hint">(Otomatis Full Screen & Splash 10 Detik)</p>
    </div>

    <div class="app-container">
        <div id="s1" class="scene active"><img src="splash1.jpg"></div>
        <div id="s2" class="scene"><img src="splash2.jpg"></div>
        <div id="s-login" class="scene">
            <img src="login.jpg">
            <button id="login-trigger" onclick="goDashboard(event)"></button>
        </div>
        <div id="s-dash" class="scene" onclick="showError()"><img src="dashboard.jpg"></div>
    </div>

    <script>
        const scene1 = document.getElementById('s1');
        const scene2 = document.getElementById('s2');
        const sceneLogin = document.getElementById('s-login');
        const sceneDash = document.getElementById('s-dash');
        const overlay = document.getElementById('start-overlay');

        function launchApp() {
            // 1. Masuk Mode Full Screen
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

            // 2. Hilangkan Overlay
            overlay.style.display = 'none';

            // 3. Alur Splash Screen
            // Splash 1 tampil 5 detik lalu ke Splash 2
            setTimeout(() => {
                swap(scene1, scene2);
                
                // Splash 2 tampil 5 detik lalu ke Halaman Login
                setTimeout(() => {
                    swap(scene2, sceneLogin);
                }, 5000);

            }, 5000);
        }

        function swap(oldScene, newScene) {
            oldScene.classList.remove('active');
            setTimeout(() => {
                newScene.classList.add('active');
            }, 50);
        }

        function goDashboard(e) {
            e.stopPropagation(); // Biar tidak trigger klik dashboard
            swap(sceneLogin, sceneDash);
        }

        function showError() {
            alert("Maaf, sistem sedang dalam perbaikan. Silakan coba lagi nanti.");
        }
    </script>
</body>
</html>
