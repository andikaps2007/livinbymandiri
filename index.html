<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Livin Simulation</title>
    <style>
        /* CSS untuk memastikan tampilan penuh dan tidak bisa di-scroll */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #004aad; /* Warna dasar biru */
            font-family: sans-serif;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Pengaturan gambar agar menutupi layar dengan rapi */
        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .scene img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Gambar akan memenuhi layar */
        }

        .scene.active {
            display: block;
            opacity: 1;
        }

        /* Overlay Awal karena Browser melarang Fullscreen otomatis tanpa klik */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            text-align: center;
            cursor: pointer;
        }

        /* Area tombol login transparan (sesuaikan posisi jika perlu) */
        #login-btn {
            position: absolute;
            bottom: 8%; /* Mengarah ke bagian bawah gambar login.jpeg */
            left: 5%;
            width: 90%;
            height: 60px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startApp()">
        <div>
            <h2>Klik untuk Masuk</h2>
            <p>Tampilan akan otomatis Full Screen</p>
        </div>
    </div>

    <div class="app-container">
        <div id="s1" class="scene active">
            <img src="splash1.jpeg" alt="Splash 1">
        </div>

        <div id="s2" class="scene">
            <img src="splash2.jpeg" alt="Splash 2">
        </div>

        <div id="s3" class="scene">
            <img src="login.jpeg" alt="Login Page">
            <button id="login-btn" onclick="goToDashboard()"></button>
        </div>

        <div id="s4" class="scene" onclick="showMaintenance()">
            <img src="dashboard.jpeg" alt="Dashboard">
        </div>
    </div>

    <script>
        const s1 = document.getElementById('s1');
        const s2 = document.getElementById('s2');
        const s3 = document.getElementById('s3');
        const s4 = document.getElementById('s4');
        const overlay = document.getElementById('overlay');

        function startApp() {
            // Aktifkan Fullscreen
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            }

            // Sembunyikan overlay
            overlay.style.display = 'none';

            // Jalankan urutan splash screen
            // 5 detik di Gambar 1
            setTimeout(() => {
                changeScene(s1, s2);
                
                // 5 detik di Gambar 2
                setTimeout(() => {
                    changeScene(s2, s3);
                }, 5000);

            }, 5000);
        }

        function changeScene(outScene, inScene) {
            outScene.classList.remove('active');
            setTimeout(() => {
                inScene.classList.add('active');
            }, 50);
        }

        function goToDashboard() {
            changeScene(s3, s4);
        }

        function showMaintenance() {
            alert("Maaf, sistem sedang dalam perbaikan. Silakan coba lagi nanti.");
        }
    </script>
</body>
</html>
